version: 1.0.0
# Peripherals Configuration for NM-CYD-C5 (ESP32-C5)
#
# Pin assignment is taken from the official NM-CYD-C5 documentation
# (https://github.com/RockBase-iot/NM-CYD-C5):
#
#   Display (ST7789)   : SCK=6  MISO=2  MOSI=7  CS=23  DC=24  RST=board RST  BL=25
#   Touch (XPT2046)    : SCK=6  MISO=2  MOSI=7  CS=1   (shares SPI2 with display)
#   SD card slot       : SCK=6  MISO=2  MOSI=7  CS=10  (shares SPI2 with display)
#   WS2812 RGB LED     : DIN=27
#   GPS (LP-UART, P5)  : ESP32 TX -> GPIO4 (GPS RX), ESP32 RX <- GPIO5 (GPS TX)
#   I2C (CN1 header)   : SDA=9   SCL=8
peripherals:
  # I2C bus exposed on the CN1 extension header (3.3V | IO9 | IO8 | GND)
  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 0
      pins:
        sda: 9
        scl: 8

  # Shared SPI bus for the on-board ST7789 LCD, XPT2046 touch and SD card slot.
  # ESP32-C5 only exposes SPI2 to user peripherals.
  - name: spi_display
    type: spi
    role: master
    config:
      spi_bus_config:
        spi_port: SPI2_HOST
        mosi_io_num: 7
        miso_io_num: 2
        sclk_io_num: 6
        max_transfer_sz: 6400          # 320 * 2 * 10 lines

  # LCD backlight is wired to GPIO25 and active HIGH on NM-CYD-C5.
  - name: ledc_backlight
    type: ledc
    role: none
    config:
      gpio_num: 25
      freq_hz: 5000
      duty: 0
      duty_resolution: LEDC_TIMER_10_BIT
      output_invert: false

