version: 1.0.0
# Devices Configuration for NM-CYD-C5 (ESP32-C5)
devices:

  # 2.8" 320x240 ST7789 LCD wired over the shared SPI bus.
  # Default rotation puts the screen in landscape (long side horizontal).
  - name: display_lcd
    chip: st7789
    type: display_lcd
    sub_type: spi
    version: default
    config:
      mirror_x: false
      mirror_y: true
      swap_xy: true
      invert_color: false
      x_max: 320
      y_max: 240
      io_spi_config:
        cs_gpio_num: 23
        dc_gpio_num: 24
        spi_mode: 0
        pclk_hz: 40000000

      lcd_panel_config:
        reset_gpio_num: -1            # RST tied to the board RST pin
        data_endian: LCD_RGB_DATA_ENDIAN_BIG
        vendor_config: NULL
    peripherals:
      - name: spi_display

  # On-board WS2812 RGB LED on GPIO27.
  # `init_skip: true` so the device entry only declares pin / chip metadata
  # and the actual driver is created on demand from Lua via
  # `led_strip.new(27, 1)` — see scripts/builtin/nm_cyd_c5_rgb.lua.
  - name: led_strip
    chip: ws2812
    type: custom
    version: default
    init_skip: true
    dependencies:
      espressif/led_strip:
        version: "^3.0"
        public: true
    config:
      max_leds: 1

  # SD-card slot wired on the shared SPI2 bus (CS=10).
  # `init_skip: true` keeps the slot probe deferred until application code
  # explicitly calls `sdcard_mount_init()`. The mount succeeds only when a
  # card is inserted; otherwise the call returns gracefully without claiming
  # the SPI bus permanently. The web file manager surfaces the mount as a
  # virtual `/sdcard` root when present.
  - name: fs_sdcard
    type: fs_fat
    sub_type: spi
    version: default
    init_skip: true
    config:
      mount_point: "/sdcard"
      frequency: SDMMC_FREQ_DEFAULT
      vfs_config:
        format_if_mount_failed: false
        max_files: 5
        allocation_unit_size: 16384
      sub_config:
        cs_gpio_num: 10
    peripherals:
      - name: spi_display

  # XPT2046 resistive touch controller (SPI, CS=1) reserved as a metadata-only
  # entry. The framework's lua lcd_touch module currently only supports the I2C
  # touch path, so this device is created with `init_skip: true`; user code can
  # take ownership of GPIO1 as the touch CS to drive XPT2046 directly over the
  # shared SPI2 bus.
  - name: lcd_touch
    chip: xpt2046
    type: custom
    version: default
    init_skip: true
    config:
      cs_gpio_num: 1
      x_max: 320
      y_max: 240
    peripherals:
      - name: spi_display
